name: Release (Manual)

on:
  workflow_dispatch:
    inputs:
      packages:
        description: 'Package dirs to publish (comma-separated, e.g. "cli" or "core,components,icons,cli")'
        required: true
        type: string
      version:
        description: 'Version bump type (ignored if custom_version is set)'
        required: false
        type: choice
        default: 'skip'
        options:
          - skip
          - patch
          - minor
          - major
          - prepatch
          - preminor
          - premajor
          - prerelease
      custom_version:
        description: 'Custom version (e.g. "1.2.3" or "1.0.0-beta.1"). Overrides version bump type.'
        required: false
        type: string
      preid:
        description: 'Pre-release identifier (e.g. alpha, beta, rc). Only used with pre* version types.'
        required: false
        default: 'alpha'
        type: string
      tag:
        description: 'npm dist-tag'
        required: true
        type: choice
        options:
          - latest
          - alpha
          - beta
          - rc

jobs:
  release:
    name: Release (Manual)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate inputs
        run: |
          if [ -z "${{ inputs.custom_version }}" ] && [ "${{ inputs.version }}" = "skip" ]; then
            echo "::error::Either set a custom_version or select a version bump type."
            exit 1
          fi

      - name: Validate packages exist and are public
        id: packages
        run: |
          IFS=',' read -ra PKGS <<< "${{ inputs.packages }}"
          VALIDATED=""
          for PKG in "${PKGS[@]}"; do
            PKG=$(echo "$PKG" | xargs) # trim whitespace
            PKG_JSON="packages/$PKG/package.json"
            if [ ! -f "$PKG_JSON" ]; then
              echo "::error::Package directory 'packages/$PKG' not found."
              exit 1
            fi
            IS_PRIVATE=$(node -p "require('./$PKG_JSON').private ?? false")
            if [ "$IS_PRIVATE" = "true" ]; then
              echo "::error::Package '$PKG' is private and cannot be published."
              exit 1
            fi
            VALIDATED="$VALIDATED $PKG"
          done
          VALIDATED=$(echo "$VALIDATED" | xargs) # trim leading space
          echo "packages=$VALIDATED" >> "$GITHUB_OUTPUT"
          echo "Validated packages: $VALIDATED"

      - name: Build
        run: pnpm run build

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump versions
        id: version
        run: |
          CUSTOM_VERSION="${{ inputs.custom_version }}"
          NEW_VERSION=""

          for PKG_DIR in ${{ steps.packages.outputs.packages }}; do
            if [ -n "$CUSTOM_VERSION" ]; then
              (cd "packages/$PKG_DIR" && npm version "$CUSTOM_VERSION" --no-git-tag-version)
              NEW_VERSION="$CUSTOM_VERSION"
            else
              VERSION_ARGS="${{ inputs.version }}"
              if [[ "$VERSION_ARGS" == pre* ]]; then
                VERSION_ARGS="$VERSION_ARGS --preid ${{ inputs.preid }}"
              fi
              (cd "packages/$PKG_DIR" && npm version $VERSION_ARGS --no-git-tag-version)
              NEW_VERSION=$(node -p "require('./packages/$PKG_DIR/package.json').version")
            fi
          done

          # Update @rootnative/core peer dep in selected packages if core was bumped
          CORE_BUMPED=false
          for PKG_DIR in ${{ steps.packages.outputs.packages }}; do
            if [ "$PKG_DIR" = "core" ]; then CORE_BUMPED=true; break; fi
          done

          if [ "$CORE_BUMPED" = true ]; then
            CORE_VERSION=$(node -p "require('./packages/core/package.json').version")
            for PKG_DIR in ${{ steps.packages.outputs.packages }}; do
              node -e "
                const fs = require('fs');
                const pkgPath = 'packages/$PKG_DIR/package.json';
                const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
                if (pkg.peerDependencies?.['@rootnative/core']) {
                  pkg.peerDependencies['@rootnative/core'] = '>=$CORE_VERSION';
                  fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
                }
              "
            done
          fi

          # Update lockfile after version bumps
          pnpm install --no-frozen-lockfile

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Regenerate LLM docs with new versions
        run: npx tsx scripts/build-llms.ts

      - name: Commit and tag
        run: |
          # Build tag from package names and version
          PKGS_LABEL=$(echo "${{ inputs.packages }}" | tr ',' '+')
          TAG="${PKGS_LABEL}@${{ steps.version.outputs.version }}"

          git add pnpm-lock.yaml
          git add packages/*/llms.txt docs/static/llms-full.txt
          for PKG_DIR in ${{ steps.packages.outputs.packages }}; do
            git add "packages/$PKG_DIR/package.json"
          done
          git commit -m "release: ${TAG}"
          git tag "$TAG"

          echo "tag=$TAG" >> "$GITHUB_ENV"

      - name: Publish packages
        run: |
          # Publish core first if included (other packages may depend on it)
          for PKG_DIR in ${{ steps.packages.outputs.packages }}; do
            if [ "$PKG_DIR" = "core" ]; then
              echo "Publishing @rootnative/core..."
              (cd packages/core && pnpm publish --provenance --access public --tag ${{ inputs.tag }} --no-git-checks)
              break
            fi
          done

          # Publish remaining packages
          for PKG_DIR in ${{ steps.packages.outputs.packages }}; do
            if [ "$PKG_DIR" = "core" ]; then continue; fi
            PKG_NAME=$(node -p "require('./packages/$PKG_DIR/package.json').name")
            echo "Publishing $PKG_NAME..."
            (cd "packages/$PKG_DIR" && pnpm publish --provenance --access public --tag ${{ inputs.tag }} --no-git-checks)
          done

      - name: Push to main
        run: |
          git push origin main
          git push origin "${{ env.tag }}"
